<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3949ab"/>
      <stop offset="100%" stop-color="#1a237e"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle top-left highlight -->
  <ellipse cx="120" cy="100" rx="280" ry="200" fill="#534bae" opacity="0.30" clip-path="url(#round)"/>

  <!-- Airplane ✈ centered upper half -->
  <text
    x="256" y="330"
    font-family="DejaVu Sans, Arial, sans-serif"
    font-size="240"
    font-weight="bold"
    text-anchor="middle"
    dominant-baseline="auto"
    fill="white"
    opacity="0.97"
  >✈</text>

  <!-- Roster lines — lower quarter -->
  <!-- Row 1: full-width header bar -->
  <rect x="90" y="345" width="332" height="22" rx="11" fill="white"/>

  <!-- Row 2: two blocks (flight in/out) -->
  <rect x="90"  y="387" width="155" height="22" rx="11" fill="white"/>
  <rect x="267" y="387" width="155" height="22" rx="11" fill="#7986cb" opacity="0.85"/>

  <!-- Row 3: short block + longer dim bar -->
  <rect x="90"  y="429" width="100" height="22" rx="11" fill="white" opacity="0.55"/>
  <rect x="210" y="429" width="212" height="22" rx="11" fill="white" opacity="0.35"/>
</svg>
