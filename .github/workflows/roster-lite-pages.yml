name: Deploy roster-lite to GitHub Pages

on:
  push:
    branches: [master]
    paths: ['roster-lite/**', '.github/workflows/roster-lite-pages.yml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: roster-lite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: roster-lite/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install "Pillow==11.0.0" --quiet
      - run: python3 scripts/gen-icons.py
        working-directory: roster-lite
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          BASE: /CrewRoster/
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: roster-lite/dist
          # Keep other top-level paths (notably the experimental preview at /exp/) instead
          # of wiping them on every production deploy.
          keep_files: true
