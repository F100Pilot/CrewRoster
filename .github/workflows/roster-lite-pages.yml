name: Deploy roster-lite to GitHub Pages

on:
  push:
    branches: [master]
    paths: ['roster-lite/**', '.github/workflows/roster-lite-pages.yml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: roster-lite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: roster-lite/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          BASE: /CrewRoster/
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: roster-lite/dist
