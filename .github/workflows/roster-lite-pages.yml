name: Deploy roster-lite to GitHub Pages

# Builds the static client-side roster viewer and publishes it to GitHub Pages.
# Enable Pages (Settings → Pages → Source: GitHub Actions) for this to take effect.
on:
  push:
    branches: [claude/crewline-web-app-u7vftg]
    paths: ['roster-lite/**', '.github/workflows/roster-lite-pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: roster-lite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: roster-lite/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          BASE: /CrewRoster/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: roster-lite/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
